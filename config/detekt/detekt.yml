# Detekt Configuration for Janus
# https://detekt.dev/docs/introduction/configurations

build:
  maxIssues: 0
  excludeCorrectable: false

config:
  validation: true

complexity:
  active: true
  CyclomaticComplexMethod:
    active: true
    threshold: 20          # Slightly relaxed for complex Hook logic
  LongMethod:
    active: true
    threshold: 80          # Relaxed for Compose UI functions
  LongParameterList:
    active: true
    threshold: 8
    ignoreAnnotated: ['Composable']  # Compose functions often have many parameters
  TooManyFunctions:
    active: true
    threshold: 20
    ignoreAnnotated: ['dagger.Module']
  NestedBlockDepth:
    active: true
    threshold: 5           # Relaxed for Hook engine code

coroutines:
  active: true

empty-blocks:
  active: true

exceptions:
  active: true
  TooGenericExceptionCaught:
    active: true
    allowedExceptionNameRegex: 'e|_'   # Allow catch(e: Exception) in Hook code
  SwallowedException:
    active: false          # Hook code sometimes intentionally swallows exceptions

naming:
  active: true
  FunctionNaming:
    active: true
    ignoreAnnotated: ['Composable']    # Compose functions use PascalCase
  TopLevelPropertyNaming:
    active: true
    constantPattern: '[A-Z][A-Za-z0-9_]*'
  VariableNaming:
    active: true
    privateVariablePattern: '_?[a-z][A-Za-z0-9]*'

performance:
  active: true

potential-bugs:
  active: true

style:
  active: true
  MagicNumber:
    active: false          # Too noisy for UI code with dp/sp values
  MaxLineLength:
    active: true
    maxLineLength: 120
    excludeCommentStatements: true
  ReturnCount:
    active: true
    max: 5                 # Relaxed for complex method chains
  WildcardImport:
    active: false          # Compose uses wildcard imports extensively
  UnusedPrivateMember:
    active: true
    allowedNames: '(_|ignored|expected)'
  ForbiddenComment:
    active: false          # Allow TODO/FIXME comments

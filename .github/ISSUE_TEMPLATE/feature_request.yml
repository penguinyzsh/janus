name: 💡 功能请求 | Feature Request
description: 提出新功能建议 | Suggest a new feature
labels: ["enhancement"]
body:
  - type: markdown
    attributes:
      value: |
        感谢你提出功能建议！请描述你希望 Janus 增加的功能。
        Thanks for suggesting a feature! Please describe what you'd like Janus to do.

  - type: dropdown
    id: feature-area
    attributes:
      label: 功能模块 | Feature Area
      description: 这个功能请求属于哪个类别？
      options:
        - 音乐白名单 | Music Whitelist
        - 歌词显示 | Lyric Display
        - 卡片管理 | Card Management
        - 系统卡片 | System Cards
        - 壁纸相关 | Wallpaper
        - 投屏设置 | Casting
        - 背屏保活 | Keep Alive
        - DPI 调整 | DPI
        - Hook 规则引擎 | Hook Rule Engine
        - UI / 用户体验
        - 新功能类别 | New Category
    validations:
      required: true

  - type: textarea
    id: problem
    attributes:
      label: 问题描述 | Problem Statement
      description: |
        这个功能要解决什么问题？
        What problem does this feature solve?
      placeholder: "当我使用 XX 功能时，我希望能够..."
    validations:
      required: true

  - type: textarea
    id: solution
    attributes:
      label: 期望方案 | Proposed Solution
      description: |
        你希望这个功能如何工作？
        How would you like this feature to work?
    validations:
      required: true

  - type: textarea
    id: alternatives
    attributes:
      label: 替代方案 | Alternatives Considered
      description: |
        你考虑过的其他方案
        Other solutions you've considered

  - type: textarea
    id: context
    attributes:
      label: 补充信息 | Additional Context
      description: |
        任何其他信息，例如截图、参考实现等
        Any other context, screenshots, or reference implementations

  - type: checkboxes
    id: checklist
    attributes:
      label: 确认 | Confirmation
      options:
        - label: 我已搜索过现有 Issue，确认没有重复的请求
          required: true

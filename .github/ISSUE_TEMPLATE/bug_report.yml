name: 🐛 Bug 报告 | Bug Report
description: 报告一个 Bug | Report a bug
labels: ["bug"]
body:
  - type: markdown
    attributes:
      value: |
        感谢你提交 Bug 报告！请尽量完整填写以下信息，帮助我们快速定位问题。
        Thanks for filing a bug report! Please fill in the details below to help us identify the issue.

  - type: input
    id: version
    attributes:
      label: Janus 版本 | Janus Version
      description: 你使用的 Janus 版本号
      placeholder: "例如 v1.1.2"
    validations:
      required: true

  - type: input
    id: device
    attributes:
      label: 设备型号 | Device Model
      description: 你的小米手机型号
      placeholder: "例如 Xiaomi MIX Flip"
    validations:
      required: true

  - type: input
    id: android-version
    attributes:
      label: Android / HyperOS 版本
      description: 系统版本信息
      placeholder: "例如 Android 15 / HyperOS 2.0"
    validations:
      required: true

  - type: input
    id: lsposed-version
    attributes:
      label: LSPosed 版本
      description: 你使用的 LSPosed 框架版本
      placeholder: "例如 LSPosed v1.9.2 (7024)"
    validations:
      required: true

  - type: dropdown
    id: feature-area
    attributes:
      label: 功能模块 | Feature Area
      description: 这个 Bug 涉及哪个功能？
      options:
        - 音乐白名单 | Music Whitelist
        - 歌词显示 | Lyric Display
        - 卡片管理 | Card Management
        - 系统卡片 | System Cards
        - 壁纸相关 | Wallpaaper
        - 投屏设置 | Casting
        - 背屏保活 | Keep Alive
        - DPI 调整 | DPI
        - Hook 规则 | Hook Rules
        - 其他 | Other
    validations:
      required: true

  - type: textarea
    id: description
    attributes:
      label: Bug 描述 | Description
      description: 清晰简洁地描述 Bug 是什么
      placeholder: 描述你遇到的问题...
    validations:
      required: true

  - type: textarea
    id: steps
    attributes:
      label: 复现步骤 | Steps to Reproduce
      description: 如何复现这个 Bug？
      value: |
        1. 
        2. 
        3. 
    validations:
      required: true

  - type: textarea
    id: expected
    attributes:
      label: 期望行为 | Expected Behavior
      description: 你期望发生什么？
    validations:
      required: true

  - type: textarea
    id: actual
    attributes:
      label: 实际行为 | Actual Behavior
      description: 实际发生了什么？
    validations:
      required: true

  - type: textarea
    id: logs
    attributes:
      label: 日志 | Logs
      description: |
        相关的 Logcat 日志（过滤 `Janus` 或 `LSPosed`）
        Relevant Logcat output (filter by `Janus` or `LSPosed`)
      render: shell

  - type: textarea
    id: screenshots
    attributes:
      label: 截图 | Screenshots
      description: 如有截图请粘贴在此处

  - type: checkboxes
    id: checklist
    attributes:
      label: 确认 | Confirmation
      options:
        - label: 我已搜索过现有 Issue，确认没有重复的报告
          required: true
        - label: 我使用的是最新版本的 Janus
          required: true
        - label: 我已在 LSPosed 中正确勾选了作用域并重启
          required: true

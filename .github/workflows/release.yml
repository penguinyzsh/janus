name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17

      - uses: gradle/actions/setup-gradle@v4

      - name: Decode keystore
        run: echo "${{ secrets.KEYSTORE_BASE64 }}" | base64 -d > ${{ github.workspace }}/release.jks

      - name: Build release APK
        env:
          KEYSTORE_FILE: ${{ github.workspace }}/release.jks
          KEYSTORE_PASSWORD: ${{ secrets.KEYSTORE_PASSWORD }}
          KEY_ALIAS: ${{ secrets.KEY_ALIAS }}
          KEY_PASSWORD: ${{ secrets.KEY_PASSWORD }}
        run: ./gradlew assembleRelease

      - name: Get version from tag
        id: version
        run: echo "name=${GITHUB_REF_NAME#v}" >> "$GITHUB_OUTPUT"

      - name: Rename APK
        run: mv app/build/outputs/apk/release/app-release.apk app/build/outputs/apk/release/Janus-${{ steps.version.outputs.name }}-arm64-v8a.apk

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          name: Janus ${{ github.ref_name }}
          generate_release_notes: true
          files: app/build/outputs/apk/release/Janus-*.apk

      - name: Sync Xposed Modules Repo (README + metadata)
        env:
          XPOSED_TOKEN: ${{ secrets.XPOSED_REPO_TOKEN }}
        run: |
          # Sync README
          git clone --depth 1 "https://x-access-token:${XPOSED_TOKEN}@github.com/Xposed-Modules-Repo/org.pysh.janus.git" xposed-repo
          cp README.md README_CN.md xposed-repo/
          cd xposed-repo
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add README.md README_CN.md
          git diff --cached --quiet || git commit -m "Sync README from main repo ${{ github.ref_name }}"
          git push
          cd ..
          # Set homepage for modules.lsposed.org website field
          curl -s -X PATCH \
            -H "Authorization: token ${XPOSED_TOKEN}" \
            -H "Accept: application/vnd.github+json" \
            https://api.github.com/repos/Xposed-Modules-Repo/org.pysh.janus \
            -d '{"homepage":"https://github.com/penguinyzsh/janus"}'

      - name: Publish to Xposed Modules Repo
        uses: softprops/action-gh-release@v2
        with:
          repository: Xposed-Modules-Repo/org.pysh.janus
          token: ${{ secrets.XPOSED_REPO_TOKEN }}
          tag_name: ${{ github.ref_name }}
          name: Janus ${{ github.ref_name }}
          generate_release_notes: false
          body: "https://github.com/penguinyzsh/janus/releases/tag/${{ github.ref_name }}"
          files: app/build/outputs/apk/release/Janus-*.apk
